<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis Dashboard - AI Resume Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
            margin-top: 2rem;
        }
        @media (max-width: 900px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }
        .card {
            background: var(--surface-color);
            border-radius: 1rem;
            padding: 2rem;
            border: 1px solid var(--border-color);
            height: 100%;
        }
        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: conic-gradient(var(--primary-color) 0%, var(--surface-color) 0%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem auto;
            position: relative;
        }
        .score-circle::before {
            content: "";
            position: absolute;
            width: 120px;
            height: 120px;
            background: var(--surface-color);
            border-radius: 50%;
        }
        .score-value {
            position: relative;
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-primary);
        }
        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary-color);
            font-weight: 600;
            font-size: 0.875rem;
            margin: 0.25rem;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }
        .badge-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error-color);
            border-color: rgba(239, 68, 68, 0.2);
        }
        .suggestion-item {
            padding: 1rem;
            border-left: 3px solid var(--secondary-color);
            background: rgba(236, 72, 153, 0.05);
            margin-bottom: 1rem;
            border-radius: 0 0.5rem 0.5rem 0;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container flex justify-between items-center">
            <a href="index.html" class="nav-brand">AI <span class="text-gradient">Analyzer</span></a>
            <ul class="nav-links">
                <li><a href="upload.html" class="btn btn-outline">Analyze New</a></li>
                <li><span id="userNameDisplay" style="color: var(--text-secondary); margin-right: 1rem;"></span></li>
                <li><a href="#" id="logoutBtn" style="color: var(--text-secondary);">Logout</a></li>
            </ul>
        </div>
    </nav>

    <main class="container" style="padding-top: 2rem; padding-bottom: 4rem;">
        <div class="flex justify-between items-center" style="margin-bottom: 2rem;">
            <h2>Your Analysis <span class="text-gradient">Report</span></h2>
            <p id="fileNameDisplay" style="color: var(--text-secondary);"></p>
        </div>

        <div id="loader" style="text-align: center; margin-top: 5rem;">
            <div class="dashboard-loader" style="display:inline-block; border: 4px solid var(--border-color); border-top: 4px solid var(--primary-color); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite;"></div>
            <p style="margin-top: 1rem; color: var(--text-secondary);">Loading your analysis...</p>
        </div>

        <div id="dashboardContent" style="display: none;">
            
            <div class="dashboard-grid">
                <!-- Left Column: Score & Top Match -->
                <div class="flex-col gap-8">
                    <div class="card text-center">
                        <h3 style="color: var(--text-secondary); font-size: 1rem; margin-bottom: 1.5rem;">Overall ATS Score</h3>
                        <div class="score-circle" id="scoreCircle">
                            <span class="score-value" id="scoreValue">0</span>
                        </div>
                        <p style="color: var(--text-secondary); font-size: 0.9rem;">Out of 100</p>
                    </div>

                    <div class="card">
                        <h3 style="color: var(--text-secondary); font-size: 1rem; margin-bottom: 1.5rem;">Best Matched Role</h3>
                        <h2 id="bestMatchRole" class="text-gradient" style="font-size: 1.8rem;">Loading...</h2>
                        <h3 id="bestMatchPct" style="margin-top: 0.5rem; font-weight: 600;">0%</h3>
                        
                        <div style="margin-top: 1.5rem;">
                            <h4 style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 0.5rem;">Detected Skills</h4>
                            <div id="detectedSkillsContainer">
                                <!-- Badges injected via JS -->
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right Column: Charts & Suggestions -->
                <div class="flex-col gap-8">
                    <div class="card">
                        <h3 style="color: var(--text-secondary); font-size: 1rem; margin-bottom: 1.5rem;">Role Compatibility Chart</h3>
                        <div style="position: relative; height: 300px; width: 100%;">
                            <canvas id="matchChart"></canvas>
                        </div>
                    </div>

                    <div class="dashboard-grid" style="grid-template-columns: 1fr 1fr; margin-top: 0;">
                        <div class="card">
                            <h3 style="color: var(--text-secondary); font-size: 1rem; margin-bottom: 1rem;">Missing Core Skills</h3>
                            <p style="font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 1rem;">Critical skills required for <span id="missingSkillsRole"></span></p>
                            <div id="missingSkillsContainer">
                                <!-- Badges injected via JS -->
                            </div>
                        </div>

                        <div class="card">
                            <h3 style="color: var(--text-secondary); font-size: 1rem; margin-bottom: 1rem;">Actionable Suggestions</h3>
                            <div id="suggestionsContainer">
                                <!-- Suggestions injected via JS -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
        </div>
    </main>

    <script src="static/js/auth.js"></script>
    <script src="static/js/dashboard.js"></script>
    <style>
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</body>
</html>
