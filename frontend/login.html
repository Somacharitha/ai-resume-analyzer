<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Resume Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container flex justify-between items-center">
            <a href="index.html" class="nav-brand">AI <span class="text-gradient">Analyzer</span></a>
            <ul class="nav-links">
                <li><a href="signup.html" class="btn btn-primary">Get Started</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <div class="form-card" style="margin-top: 6rem;">
            <h2 class="text-center text-gradient" style="margin-bottom: 2rem;">Welcome Back</h2>
            
            <div id="alertBox" class="alert"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-input" required placeholder="john@example.com">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-input" required placeholder="••••••••">
                </div>

                <button type="submit" class="btn btn-primary w-full mt-4">Login</button>
                
                <p class="text-center mt-4" style="color: var(--text-secondary); margin-top: 1.5rem;">
                    Don't have an account? <a href="signup.html" style="color: var(--primary-color); text-decoration: none;">Sign up</a>
                </p>
            </form>
        </div>
    </main>

    <script src="static/js/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertBox = document.getElementById('alertBox');

            const success = await handleLogin(email, password);
            if (success) {
                showAlert(alertBox, 'Login successful! Redirecting...', 'success');
                setTimeout(() => window.location.href = 'dashboard.html', 1000);
            } else {
                showAlert(alertBox, 'Invalid credentials. Please try again.', 'error');
            }
        });

        function showAlert(element, message, type) {
            element.textContent = message;
            element.className = 'alert ' + type;
        }
    </script>
</body>
</html>
